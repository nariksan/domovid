<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ДОМОВИД</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        h1 { color: #667eea; text-align: center; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #333; }
        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
        }
        input:focus { outline: none; border-color: #667eea; }
        button {
            width: 100%;
            padding: 14px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        button:hover { background: #5568d3; }
        .error {
            background: #fff5f5;
            color: #dc3545;
            padding: 12px;
            border-radius: 8px;
            margin-top: 15px;
            display: none;
        }
        .hint {
            background: #e7f3ff;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            font-size: 14px;
        }
        .user-info {
            background: rgba(255,255,255,0.2);
            padding: 10px 20px;
            border-radius: 20px;
            display: inline-block;
            margin-top: 10px;
        }
        nav {
            display: flex;
            gap: 10px;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        nav button {
            width: auto;
            padding: 10px 20px;
            background: white;
            color: #667eea;
        }
        nav button.active { background: #667eea; color: white; }
        .section { display: none; }
        .section.active { display: block; }
        .card {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin: 10px 0;
            border-left: 4px solid #667eea;
        }
        .logout { background: #dc3545; margin-top: 20px; }
        .logout:hover { background: #c82333; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏠 ДОМОВИД</h1>
        
        <!-- LOGIN FORM -->
        <div id="loginForm">
            <div class="form-group">
                <label>📱 Телефон</label>
                <input type="tel" id="phone" placeholder="89004346000">
            </div>
            <div class="form-group">
                <label> Пароль</label>
                <input type="password" id="password" placeholder="Введите пароль">
            </div>
            <button onclick="login()">Войти</button>
            <div id="errorMsg" class="error"></div>
            <div class="hint">
                <strong>Тестовый вход:</strong><br>
                Телефон: 89004346000<br>
                Пароль: 6000
            </div>
        </div>

        <!-- MAIN APP -->
        <div id="mainApp" style="display:none;">
            <div style="text-align: center; margin-bottom: 20px;">
                <div class="user-info">
                     <span id="userName"></span> 
                    <span id="userRole" style="background: #ffc107; padding: 2px 10px; border-radius: 10px; margin-left: 10px;"></span>
                </div>
            </div>

            <nav>
                <button onclick="show('schedule')" class="active"> График</button>
                <button onclick="show('admin')" id="adminNav" style="display:none;">⚙️ Админ</button>
                <button onclick="logout()" class="logout"> Выйти</button>
            </nav>

            <div id="schedule" class="section active">
                <h2> График работы</h2>
                <div id="scheduleList"></div>
            </div>

            <div id="admin" class="section">
                <h2>⚙️ Админ-панель</h2>
                
                <div class="card">
                    <h3>Добавить в график</h3>
                    <div class="form-group">
                        <label>Дата</label>
                        <input type="date" id="schedDate">
                    </div>
                    <div class="form-group">
                        <label>Сотрудник</label>
                        <select id="schedEmployee"></select>
                    </div>
                    <div class="form-group">
                        <label>Тип</label>
                        <select id="schedType">
                            <option value="kassa">Касса</option>
                            <option value="kd">КД</option>
                            <option value="other">Без указания</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Смена</label>
                        <select id="schedShift">
                            <option value="1">10:00 - 19:00</option>
                            <option value="2">12:00 - 21:00</option>
                            <option value="3">10:00 - 21:00</option>
                        </select>
                    </div>
                    <button onclick="addSchedule()">➕ Добавить</button>
                </div>

                <div class="card">
                    <h3>Добавить сотрудника</h3>
                    <div class="form-group">
                        <label>ФИО</label>
                        <input type="text" id="newName">
                    </div>
                    <div class="form-group">
                        <label>Телефон</label>
                        <input type="tel" id="newPhone">
                    </div>
                    <div class="form-group">
                        <label>Пароль</label>
                        <input type="text" id="newPassword">
                    </div>
                    <button onclick="addEmployee()">➕ Добавить</button>
                </div>

                <div class="card">
                    <h3>Сотрудники</h3>
                    <div id="employeeList"></div>
                </div>

                <button onclick="logout()" class="logout">🚪 Выйти</button>
            </div>
        </div>
    </div>

    <script>
        // Firebase config
        const firebaseConfig = {
            apiKey: "AIzaSyDx5QGxg6nx3X4JDHiyqLI4zdIm3E2VrIk",
            authDomain: "domovid.firebaseapp.com",
            projectId: "domovid",
            storageBucket: "domovid.firebasestorage.app",
            messagingSenderId: "670604814973",
            appId: "1:670604814973:web:e69867d18de3e801651f14"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let currentUser = null;

        // Check auth on load
        window.onload = function() {
            const session = localStorage.getItem('domovidSession');
            if (session) {
                const userData = JSON.parse(session);
                db.collection('users').doc(userData.id).get().then(doc => {
                    if (doc.exists) {
                        currentUser = { id: doc.id, ...doc.data() };
                        showMainApp();
                    } else {
                        localStorage.removeItem('domovidSession');
                    }
                }).catch(err => {
                    console.error('Error:', err);
                });
            }
        };

        function login() {
            const phone = document.getElementById('phone').value.replace(/\D/g, '');
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMsg');

            if (!phone || !password) {
                errorDiv.textContent = 'Введите телефон и пароль';
                errorDiv.style.display = 'block';
                return;
            }

            db.collection('users')
                .where('phone', '==', phone)
                .where('password', '==', password)
                .get()
                .then(snapshot => {
                    if (snapshot.empty) {
                        errorDiv.textContent = '❌ Неверный телефон или пароль';
                        errorDiv.style.display = 'block';
                    } else {
                        const doc = snapshot.docs[0];
                        currentUser = { id: doc.id, ...doc.data() };
                        localStorage.setItem('domovidSession', JSON.stringify({ id: doc.id }));
                        showMainApp();
                    }
                })
                .catch(error => {
                    errorDiv.textContent = 'Ошибка: ' + error.message;
                    errorDiv.style.display = 'block';
                    console.error('Login error:', error);
                });
        }

        function showMainApp() {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            document.getElementById('userName').textContent = currentUser.name;
            document.getElementById('userRole').textContent = 
                currentUser.role === 'admin' ? '👑 Админ' : '👤 Сотрудник';
            
            if (currentUser.role === 'admin') {
                document.getElementById('adminNav').style.display = 'inline-block';
                loadEmployees();
            }
            
            loadSchedule();
            
            // Real-time updates
            db.collection('schedule').onSnapshot(() => loadSchedule());
            if (currentUser.role === 'admin') {
                db.collection('users').onSnapshot(() => loadEmployees());
            }
        }

        function show(section) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
            document.getElementById(section).classList.add('active');
            event.target.classList.add('active');
        }

        function loadSchedule() {
            db.collection('schedule').orderBy('date').onSnapshot(snapshot => {
                const list = document.getElementById('scheduleList');
                if (snapshot.empty) {
                    list.innerHTML = '<div class="card">📅 График пустой</div>';
                    return;
                }
                
                list.innerHTML = snapshot.docs.map(doc => {
                    const data = doc.data();
                    return `
                        <div class="card">
                            <strong>📅 ${data.date}</strong><br>
                            ${data.entries.map(e => `
                                <div style="margin: 8px 0; padding: 8px; background: white; border-radius: 4px;">
                                    👤 ${e.employee} | 
                                    ${e.type === 'kassa' ? ' Касса' : e.type === 'kd' ? '📋 КД' : ' Другое'} | 
                                    Смена ${e.shift}
                                </div>
                            `).join('')}
                        </div>
                    `;
                }).join('');
            });
        }

        function loadEmployees() {
            db.collection('users').onSnapshot(snapshot => {
                const list = document.getElementById('employeeList');
                const select = document.getElementById('schedEmployee');
                
                if (snapshot.empty) {
                    list.innerHTML = '<p style="color: #999;">Нет сотрудников</p>';
                    return;
                }
                
                list.innerHTML = snapshot.docs.map(doc => {
                    const emp = doc.data();
                    return `
                        <div style="padding: 10px; background: white; margin: 5px 0; border-radius: 4px; display: flex; justify-content: space-between; align-items: center;">
                            <div>
                                <strong>${emp.name}</strong><br>
                                <small style="color: #666;">${emp.phone} | ${emp.role === 'admin' ? '👑 Админ' : '👤 Сотрудник'}</small>
                            </div>
                            ${doc.id !== currentUser.id ? `<button onclick="deleteEmployee('${doc.id}')" style="width: auto; padding: 5px 10px; background: #dc3545; font-size: 12px;">✕</button>` : '<small>Вы</small>'}
                        </div>
                    `;
                }).join('');
                
                select.innerHTML = '<option value="">-- Выберите --</option>' + 
                    snapshot.docs.map(doc => `<option value="${doc.data().name}">${doc.data().name}</option>`).join('');
            });
        }

        function addSchedule() {
            const date = document.getElementById('schedDate').value;
            const employee = document.getElementById('schedEmployee').value;
            const type = document.getElementById('schedType').value;
            const shift = document.getElementById('schedShift').value;

            if (!date || !employee) {
                alert('Выберите дату и сотрудника');
                return;
            }

            const [year, month, day] = date.split('-');
            const formattedDate = `${day}.${month}.${year}`;

            db.collection('schedule').doc(date).get().then(doc => {
                let entries = doc.exists ? doc.data().entries || [] : [];
                entries.push({ employee, type, shift });
                db.collection('schedule').doc(date).set({
                    date: formattedDate,
                    entries: entries
                }).then(() => {
                    alert('✅ Добавлено!');
                    document.getElementById('schedDate').value = '';
                    document.getElementById('schedEmployee').value = '';
                });
            });
        }

        function addEmployee() {
            const name = document.getElementById('newName').value.trim();
            const phone = document.getElementById('newPhone').value.trim();
            const password = document.getElementById('newPassword').value;

            if (!name || !phone || !password) {
                alert('Заполните все поля');
                return;
            }

            db.collection('users').add({
                name,
                phone,
                password,
                role: 'user'
            }).then(() => {
                alert('✅ Сотрудник добавлен!');
                document.getElementById('newName').value = '';
                document.getElementById('newPhone').value = '';
                document.getElementById('newPassword').value = '';
            });
        }

        function deleteEmployee(id) {
            if (id === currentUser.id) {
                alert('Нельзя удалить себя!');
                return;
            }
            if (confirm('Удалить сотрудника?')) {
                db.collection('users').doc(id).delete();
            }
        }

        function logout() {
            localStorage.removeItem('domovidSession');
            location.reload();
        }
    </script>
</body>
</html>
